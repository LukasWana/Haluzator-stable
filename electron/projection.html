<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Projection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #projection-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            padding: 0;
        }
        #shader-canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
        }
        #html-overlay-container {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>
    <div id="projection-container"></div>
    <script>
        // Wait for content to be injected and move elements from main window
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('projection-container');
            if (!container) return;

            // Try to access main window via opener
            const mainWindow = window.opener;

            if (mainWindow) {
                // Wait a bit for elements to be ready
                setTimeout(() => {
                    try {
                        // Get elements from main window
                        const canvas = mainWindow.document.getElementById('shader-canvas');
                        const overlay = mainWindow.document.getElementById('html-overlay-container');

                        if (canvas && overlay) {
                            // Move elements to projection window
                            container.appendChild(canvas);
                            container.appendChild(overlay);

                            // Ensure elements have correct styles
                            canvas.style.cssText = 'width:100% !important;height:100% !important;position:absolute !important;top:0 !important;left:0 !important;margin:0 !important;padding:0 !important;display:block !important;';
                            overlay.style.cssText = 'width:100% !important;height:100% !important;position:absolute !important;top:0 !important;left:0 !important;margin:0 !important;padding:0 !important;';
                        }
                    } catch (error) {
                        console.error('Error moving elements:', error);
                    }
                }, 500);
            } else {
                // If opener is null, wait for IPC signal
                // Elements will be moved via executeJavaScript from main process
                console.log('Waiting for elements to be moved via IPC...');
            }
        });
    </script>
</body>
</html>
